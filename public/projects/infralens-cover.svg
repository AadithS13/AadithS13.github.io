<svg width="1400" height="360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="65%" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </linearGradient>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,1 L5,3 L0,5 Z" fill="#252525"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="360" fill="#0a0a0a"/>
  <rect width="1400" height="360" fill="url(#glow)"/>

  <!-- Subtle horizontal rules -->
  <line x1="0" y1="116" x2="1400" y2="116" stroke="#0f0f0f" stroke-width="1"/>
  <line x1="0" y1="236" x2="1400" y2="236" stroke="#0f0f0f" stroke-width="1"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="170" height="2.5" fill="#4ade80" opacity="0.65"/>

  <!-- ── LEFT PANEL ──────────────────────────────────── -->

  <!-- Title + subtitle -->
  <text x="60" y="65" font-family="monospace" font-size="36" font-weight="600" fill="#4ade80">InfraLens</text>
  <text x="60" y="91" font-family="monospace" font-size="12" fill="#333" letter-spacing="0.4">AI-Powered Construction Intelligence Platform</text>

  <line x1="60" y1="108" x2="560" y2="108" stroke="#161616" stroke-width="1"/>

  <!-- Stats row -->
  <text x="60" y="142" font-family="monospace" font-size="28" font-weight="600" fill="#d4d4d4">47,832+</text>
  <text x="60" y="161" font-family="monospace" font-size="9.5" fill="#333">Projects Tracked</text>

  <text x="240" y="142" font-family="monospace" font-size="28" font-weight="600" fill="#d4d4d4">7</text>
  <text x="240" y="161" font-family="monospace" font-size="9.5" fill="#333">APIs Reverse-Engineered</text>

  <text x="352" y="142" font-family="monospace" font-size="28" font-weight="600" fill="#4ade80">V7</text>
  <text x="352" y="161" font-family="monospace" font-size="9.5" fill="#333">AI-Powered Search</text>

  <line x1="60" y1="178" x2="560" y2="178" stroke="#161616" stroke-width="1"/>

  <!-- Feature list -->
  <text x="60" y="200" font-family="monospace" font-size="10.5" fill="#2d2d2d">›  Snapshot-based change detection</text>
  <text x="60" y="220" font-family="monospace" font-size="10.5" fill="#2d2d2d">›  Email + Webhook notification engine</text>
  <text x="60" y="240" font-family="monospace" font-size="10.5" fill="#2d2d2d">›  NLP search with Claude-powered parsing</text>
  <text x="60" y="260" font-family="monospace" font-size="10.5" fill="#2d2d2d">›  Analytics API with audit history</text>

  <line x1="60" y1="277" x2="560" y2="277" stroke="#161616" stroke-width="1"/>

  <!-- Tech badges -->
  <rect x="60"  y="289" width="30"  height="18" rx="3" fill="#0f0f0f" stroke="#1c1c1c"/>
  <text x="75"  y="301.5" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">Go</text>

  <rect x="98"  y="289" width="70"  height="18" rx="3" fill="#0f0f0f" stroke="#1c1c1c"/>
  <text x="133" y="301.5" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">PostgreSQL</text>

  <rect x="176" y="289" width="52"  height="18" rx="3" fill="#0f0f0f" stroke="#1c1c1c"/>
  <text x="202" y="301.5" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">pg_trgm</text>

  <rect x="236" y="289" width="70"  height="18" rx="3" fill="#0f0f0f" stroke="#1c1c1c"/>
  <text x="271" y="301.5" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">Claude API</text>

  <rect x="314" y="289" width="38"  height="18" rx="3" fill="#0f0f0f" stroke="#1c1c1c"/>
  <text x="333" y="301.5" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">SMTP</text>

  <rect x="360" y="289" width="48"  height="18" rx="3" fill="#0f0f0f" stroke="#1c1c1c"/>
  <text x="384" y="301.5" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">Docker</text>

  <!-- ── VERTICAL DIVIDER ────────────────────────── -->
  <line x1="618" y1="22" x2="618" y2="338" stroke="#141414" stroke-width="1"/>

  <!-- ── RIGHT PANEL: Pipeline ──────────────────── -->
  <!-- Center of right panel: (618 + 1400) / 2 = 1009 -->
  <!-- Nodes: width=260, so x = 879..1139, center=1009 -->

  <text x="1009" y="38" font-family="monospace" font-size="8.5" fill="#242424" text-anchor="middle" letter-spacing="3">CRAWL PIPELINE</text>

  <!-- Node 1: MahaRERA API -->
  <rect x="879" y="46" width="260" height="40" rx="5" fill="#0d0d0d" stroke="#1a1a1a"/>
  <text x="1009" y="64"  font-family="monospace" font-size="11"  fill="#484848" text-anchor="middle">MahaRERA Public API</text>
  <text x="1009" y="79"  font-family="monospace" font-size="8.5" fill="#2a2a2a" text-anchor="middle">maharashtra.gov.in · Keycloak JWT · RWMutex</text>
  <line x1="1009" y1="86"  x2="1009" y2="104" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Node 2: Crawler (green accent) -->
  <rect x="879" y="106" width="260" height="40" rx="5" fill="#0b150b" stroke="#4ade8033" stroke-width="1.5"/>
  <text x="1009" y="124" font-family="monospace" font-size="11"  fill="#4ade80" text-anchor="middle">Crawler + Worker Pool</text>
  <text x="1009" y="139" font-family="monospace" font-size="8.5" fill="#2a4a2a" text-anchor="middle">Go · 5 goroutines · sequential ID range · rate-limited</text>
  <line x1="1009" y1="146" x2="1009" y2="164" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Node 3: Snapshot + Diff -->
  <rect x="879" y="166" width="260" height="40" rx="5" fill="#0d0d0d" stroke="#1a1a1a"/>
  <text x="1009" y="184" font-family="monospace" font-size="11"  fill="#484848" text-anchor="middle">Snapshot + Diff Engine</text>
  <text x="1009" y="199" font-family="monospace" font-size="8.5" fill="#2a2a2a" text-anchor="middle">MD5 checksum · 7-field diff · change history</text>
  <line x1="1009" y1="206" x2="1009" y2="224" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Node 4: PostgreSQL (green accent) -->
  <rect x="879" y="226" width="260" height="40" rx="5" fill="#0b150b" stroke="#4ade8033" stroke-width="1.5"/>
  <text x="1009" y="244" font-family="monospace" font-size="11"  fill="#4ade80" text-anchor="middle">PostgreSQL</text>
  <text x="1009" y="259" font-family="monospace" font-size="8.5" fill="#2a4a2a" text-anchor="middle">projects · snapshots · changes · crawl_runs</text>
  <line x1="1009" y1="266" x2="1009" y2="284" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Node 5: REST API + NLP -->
  <rect x="879" y="286" width="260" height="40" rx="5" fill="#0d0d0d" stroke="#1a1a1a"/>
  <text x="1009" y="304" font-family="monospace" font-size="11"  fill="#484848" text-anchor="middle">REST API · NLP Search</text>
  <text x="1009" y="319" font-family="monospace" font-size="8.5" fill="#2a2a2a" text-anchor="middle">Search · Analytics · Notify · Claude parsing</text>

  <!-- Bottom fade -->
  <rect width="1400" height="360" fill="url(#fade)"/>
</svg>
